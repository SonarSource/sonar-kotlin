name: Releasability status

on:
  workflow_dispatch:
  workflow_run:
    workflows: [ Build ]  # Name must match the build workflow
    types:
      - completed
    branches:
      - master
      - branch-*

jobs:
  update_releasability_status:
    runs-on: github-ubuntu-latest-s
    timeout-minutes: 10
    name: Releasability status
    permissions:
      id-token: write
      statuses: write
      contents: read
    steps:
      - uses: SonarSource/gh-action_releasability/releasability-status@3.0.5
        with:
          optional_checks: "Jira"
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
